  <text x="685" y="548" text-anchor="middle" font-size="15" fill="#1e1e1e" font-weight="bold">Git + CI/CD</text>
  <text x="685" y="566" text-anchor="middle" font-size="12" fill="#757575">GitHub Actions</text>

  <rect x="790" y="520" width="140" height="65" rx="8" fill="#c3fae8" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="860" y="548" text-anchor="middle" font-size="15" fill="#1e1e1e" font-weight="bold">Linear</text>
  <text x="860" y="566" text-anchor="middle" font-size="12" fill="#757575">PM Tool</text>

  <line x1="350" y1="470" x2="140" y2="520" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-t)"/>
  <line x1="420" y1="470" x2="330" y2="520" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-t)"/>
  <line x1="520" y1="470" x2="500" y2="520" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-t)"/>
  <line x1="620" y1="470" x2="700" y2="520" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-t)"/>
  <line x1="700" y1="470" x2="870" y2="520" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-t)"/>

