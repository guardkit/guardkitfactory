  <text x="750" y="657" text-anchor="middle" font-size="14" fill="#1e1e1e">MacBook Pro M2 Max — Planning, Dashboard</text>

  <text x="30" y="710" font-size="12" fill="#757575">Green = exists · Blue/purple = Phase 4 (later) · Amber = NATS (Phase 2) · Teal = tools the orchestrator invokes</text>
</svg>
