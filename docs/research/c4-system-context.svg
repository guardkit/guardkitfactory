  <rect x="30" y="155" width="980" height="85" rx="12" fill="#dbe4ff" fill-opacity="0.3" stroke="#4a9eed" stroke-width="1"/>
  <text x="40" y="174" font-size="14" fill="#2563eb" font-weight="bold">Input Adapters (Phase 4 — later)</text>
  <rect x="50" y="186" width="110" height="42" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
