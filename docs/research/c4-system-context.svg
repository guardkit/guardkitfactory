  <rect x="435" y="186" width="70" height="42" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="470" y="211" text-anchor="middle" font-size="12" fill="#1e1e1e">CLI</text>
  <rect x="520" y="186" width="120" height="42" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="580" y="211" text-anchor="middle" font-size="12" fill="#1e1e1e">Linear/GitHub</text>
  <rect x="655" y="186" width="110" height="42" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="710" y="211" text-anchor="middle" font-size="12" fill="#1e1e1e">CI/CD Hook</text>

